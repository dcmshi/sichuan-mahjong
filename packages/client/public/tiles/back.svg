<?xml version="1.0" encoding="utf-8"?>
<!-- Tile back: solid green, using the same green family as the face tiles'
     bevelled sides/lip (#005F00 + #147E48) so face-up and face-down tiles read
     as the same physical piece. Same silhouette as the face SVGs. -->
<svg version="1.1" id="back"
     xmlns="http://www.w3.org/2000/svg" x="0px" y="0px"
     viewBox="0 0 210 255"
     style="enable-background:new 0 0 210 255;" xml:space="preserve">
  <style type="text/css">
    .b0{fill:#000000;}
    .b1{fill:#005F00;}   /* dark green — outer bevel / lip (matches face sides) */
    .b2{fill:#CDDACD;}   /* thin light rim (matches face border) */
    .b5{fill:#147E48;}   /* solid green field */
    .b7{fill:#1a8c50;}   /* subtle top highlight */
  </style>
  <g transform="matrix(1.0005937,0,0,1,-1.3758072,203.40625)">
    <!-- Black outer rounded rectangle -->
    <path class="b0" d="M60.7-203.4l46.1,0.2l68.4-0.2c22.9-0.1,36.1,15.9,36.1,40.4V-8.4c0,12.3-14,27.7-21.4,35.7
        c-7.4,8-22.1,24.3-33.6,24.3h-113C20.4,51.6,2,46,2,21.4L1.7-140.9c0-6.4,17.3-24.3,24.8-32.4C33.9-181.3,49.2-203.5,60.7-203.4z"/>
    <!-- Dark green ring — the bevelled lip -->
    <path class="b1" d="M69.5-190.7H174c13.8,0,24.8,11.1,24.9,24.9l0.9,152.4c0,2-12.6,32-25.8,32H69.5
        c-13.8,0-24.9-11.1-24.9-24.9v-159.5C44.6-179.6,55.7-190.7,69.5-190.7z"/>
    <!-- Thin light rim -->
    <path class="b2" d="M54.5-175.8h99.6c13.7,0,24.9,11.2,24.9,24.9V8.6c0,13.8-11.1,24.9-24.9,24.9H54.5
        c-13.7,0-24.9-11.2-24.9-24.9v-159.4C29.6-164.6,40.8-175.8,54.5-175.8z"/>
    <!-- Solid green field -->
    <path class="b5" d="M44.6-160.8h104.5c13.7,0,24.9,11.2,24.9,24.9V13.6c0,13.8-11.1,24.9-24.9,24.9H44.6
        c-13.7,0-24.9-11.2-24.9-24.9v-149.5C19.7-149.6,30.8-160.8,44.6-160.8z"/>
    <!-- Subtle top highlight for a soft 3D sheen -->
    <path class="b7" opacity="0.6" d="M44.6-160.8h104.5c13.7,0,24.9,11.2,24.9,24.9v6H19.7v-6
        C19.7-149.6,30.8-160.8,44.6-160.8z"/>
  </g>
</svg>
