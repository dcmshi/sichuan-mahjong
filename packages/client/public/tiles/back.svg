    <line x1="14" y1="118" x2="64" y2="52"   stroke="#147E48" stroke-width="4"/>
    <line x1="14" y1="93"  x2="39" y2="52"   stroke="#147E48" stroke-width="4"/>
    <line x1="39" y1="218" x2="164" y2="143" stroke="#147E48" stroke-width="4"/>
